  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      /* single theme — dark masthead/hero over a light teal field (matches the homepage) */
      --black: #e7efee; --surface: #f7fcfc; --surface-2: #dce8e7; --surface-deep: #0D2828;
      --border: #c7d9d7; --border-2: #b1c8c5; --text: #0b1b1b; --text-2: #41585a;
      --text-3: #5a7473; --accent: #0e9a9d; --accent-text: #0f7476; --on-accent: #ffffff;
      --hero-bg: #0f1416; --nav-accent: #3BD1D3; --logo-filter: none; --logo-blend: screen;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--black); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 16px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    @media (prefers-reduced-motion: no-preference) { #state-article { animation: pageReveal .55s cubic-bezier(.22,1,.36,1); } }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; background: transparent; border-bottom: none; box-shadow: none; transition: background .3s ease, box-shadow .3s ease; }
    nav.nav-solid { background: rgba(15,20,22,0.97); box-shadow: 0 1px 0 rgba(255,255,255,0.05); }
    .nav-faq { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: #3BD1D3; text-decoration: none; padding: 7px 13px; border: 1px solid rgba(59,209,211,.4); border-radius: 6px; transition: background .15s; }

    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo img { height: 26px; width: auto; mix-blend-mode: var(--logo-blend); filter: var(--logo-filter); opacity: 0.9; }
    .nav-right { display: flex; align-items: center; gap: 24px; }
    .nav-cta { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--on-accent); background: var(--accent); text-decoration: none; padding: 8px 14px; border-radius: 4px; font-weight: 500; transition: opacity 0.15s; }
    .nav-cta:hover { opacity: 0.85; }
    .theme-toggle { background: none; border: 1px solid var(--border-2); color: var(--text-3); cursor: pointer; width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s; flex-shrink: 0; }
    .theme-toggle:hover { border-color: var(--text-3); color: var(--text-2); }
    .theme-toggle svg { width: 14px; height: 14px; }
    .theme-toggle .icon-dark { display: none; }
    .theme-toggle .icon-light { display: none; }
    .theme-toggle .icon-system { display: block; }
    [data-theme="dark"]  .theme-toggle .icon-dark   { display: block; }
    [data-theme="dark"]  .theme-toggle .icon-light  { display: none;  }
    [data-theme="dark"]  .theme-toggle .icon-system { display: none;  }
    [data-theme="light"] .theme-toggle .icon-dark   { display: none;  }
    [data-theme="light"] .theme-toggle .icon-light  { display: block; }
    [data-theme="light"] .theme-toggle .icon-system { display: none;  }
    /* Article layout — header is the dark hero band */
    .article-header { background: var(--hero-bg); padding: 104px 48px 52px; }
    .ah-inner { max-width: 820px; margin: 0 auto; }
    .back-link { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.06em; color: #7aacac; text-decoration: none; display: inline-block; margin-bottom: 36px; transition: color 0.15s; }
    .back-link:hover { color: var(--nav-accent); }
    .article-eyebrow { font-family: ui-monospace, monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--nav-accent); margin-bottom: 18px; }
    .article-title { font-size: clamp(34px, 6vw, 62px); font-weight: 800; letter-spacing: -0.02em; line-height: 1.05; color: #f4f7f7; margin-bottom: 14px; }
    .article-sub { font-size: 20px; color: #b9d2d2; margin-bottom: 16px; font-weight: 400; }
    .article-meta { font-family: ui-monospace, monospace; font-size: 11px; color: #7aacac; letter-spacing: 0.04em; }
    .article-hero-img { max-width: 820px; margin: 48px auto 64px; padding: 0 48px; }

    .article-body { max-width: 720px; margin: 0 auto; padding: 0 48px 96px; }
    /* Section and content styles */
    .article-body .article-section { margin-bottom: 52px; }
    .article-body .article-section h2,

    .article-body .article-section p,
    .article-body p { font-size: 18px; line-height: 1.8; color: var(--text); margin-bottom: 18px; }
    .article-body p:last-child { margin-bottom: 0; }
    .article-body .article-section ul, .article-body .article-section ol,
    .article-body ul, .article-body ol { margin: 0 0 18px 24px; }
    .article-body .article-section li,
    .article-body li { font-size: 18px; line-height: 1.75; color: var(--text); margin-bottom: 10px; }
    .article-body .article-section strong,
    .article-body strong { color: var(--text); font-weight: 700; }
    .article-body .accent-text { color: var(--accent); font-weight: 600; }
    /* Special blocks */
    .article-body .deep-dive { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px 32px; margin-bottom: 28px; }
    .article-body .deep-dive p { font-size: 17px; line-height: 1.75; color: var(--text-2); margin-bottom: 14px; }
    .article-body .deep-dive p:last-child { margin-bottom: 0; }
    .article-body .deep-dive ul, .article-body .deep-dive ol { margin: 0 0 14px 20px; }
    .article-body .deep-dive li { font-size: 17px; line-height: 1.7; color: var(--text-2); margin-bottom: 8px; }
    .article-body .deep-dive strong { color: var(--text); font-weight: 700; }
    .article-body .pullquote,
    .article-body blockquote { border-left: 3px solid var(--accent); padding: 4px 0 4px 24px; margin: 0 0 40px; }
    .article-body .pullquote p,
    .article-body blockquote p { font-size: 19px; font-style: italic; line-height: 1.55; color: var(--text-2); margin: 0; }
    .article-body .prompt-block { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border-2); border-radius: 8px; padding: 24px 28px; margin-bottom: 32px; overflow-x: auto; }
    .article-body .prompt-label { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-3); margin-bottom: 14px; }
    .article-body .prompt-block p { font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.75; color: var(--text-2); margin-bottom: 10px; }
    .article-body .prompt-block p:last-child { margin-bottom: 0; }
    .article-body .prompt-block strong { color: var(--text); }
    .article-body .drop-mic { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 12px; padding: 40px; margin-bottom: 52px; }
    .article-body .drop-mic-label { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; }
    .article-body .drop-mic p { font-size: 18px; line-height: 1.8; color: var(--text); margin-bottom: 16px; }
    .article-body .drop-mic p:last-child { margin-bottom: 0; }
    .article-body .drop-mic strong { color: var(--accent); }
    .article-body .drop-mic em { color: var(--text-2); }
    .article-body .drop-mic ol, .article-body .drop-mic ul { margin: 0 0 16px 24px; }
    .article-body .drop-mic li { font-size: 18px; line-height: 1.75; color: var(--text); margin-bottom: 8px; }
    .article-body .pitch-card { background: var(--surface-deep); border: 1px solid var(--border); border-radius: 12px; padding: 36px; margin-bottom: 52px; }
    .article-body .pitch-card p { font-size: 17px; line-height: 1.75; color: var(--text-2); margin-bottom: 16px; }
    .article-body .pitch-cta { display: inline-block; font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--on-accent); background: var(--accent); text-decoration: none; padding: 12px 20px; border-radius: 6px; font-weight: 600; transition: opacity 0.15s; }
    .article-body .pitch-cta:hover { opacity: 0.85; }
    .article-body .article-last-img { margin-bottom: 48px; }
    .article-body .article-last-img img { width: 100%; border-radius: 10px; }
    /* Markdown-rendered content extras */
    .article-body h1 { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); margin-bottom: 20px; margin-top: 48px; }
    .article-body h3 { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 16px; margin-top: 32px; }
    .article-body h4 { font-size: 18px; font-weight: 700; color: var(--text-2); margin-bottom: 12px; margin-top: 24px; }
    .article-body code { font-family: ui-monospace, monospace; font-size: 13px; background: var(--surface); color: var(--accent); padding: 2px 6px; border-radius: 4px; }
    .article-body pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 28px; overflow-x: auto; }
    .article-body pre code { background: none; padding: 0; color: var(--text-2); font-size: 13px; }
    .article-body hr { border: none; border-top: 1px solid var(--border); margin: 48px 0; }
    .article-body a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    /* States */
    .state-msg { padding: 120px 48px; text-align: center; font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 0.1em; color: var(--text-3); }
    .state-msg a { color: var(--accent); text-decoration: none; }
    /* Footer — calling-card decode */
    footer { background:#0f1416; border-top:none; display:flex; flex-direction:column; align-items:center; gap:26px; padding:60px 20px 44px; }
    .cc-card { display:inline-block; }
    .cc-grid { display:inline-grid; grid-template-columns:auto auto auto; align-items:center; justify-items:center; row-gap:5px; }
    .cc-lbl { font-family: ui-monospace,monospace; font-size:10px; letter-spacing:.18em; color:#6fc9ca; text-transform:uppercase; text-decoration:none; white-space:nowrap; }
    a.cc-lbl:hover { color:#a7c4c4; }
    .cc-lbl-ig  { grid-row:1; grid-column:1 / 3; }
    .cc-br-top  { grid-row:2; grid-column:1 / 3; }
    .cc-at   { grid-row:3; grid-column:1; }
    .cc-core { grid-row:3; grid-column:2; }
    .cc-tld  { grid-row:3; grid-column:3; }
    .cc-br-bot  { grid-row:4; grid-column:2 / 4; }
    .cc-lbl-web { grid-row:5; grid-column:2 / 4; }
    .cc-bracket { width:100%; height:7px; border:1px solid rgba(255,255,255,.32); justify-self:stretch; }
    .cc-br-top { border-bottom:none; }
    .cc-br-bot { border-top:none; }
    .cc-ch { font-size: clamp(17px,2.6vw,24px); font-weight:600; letter-spacing:.01em; color:#f4f7f7; }
    .cc-meta { font-family: ui-monospace,monospace; font-size:9px; letter-spacing:.06em; color:#5a7473; text-align:center; }
    .cc-meta a { color:#5a7473; text-decoration:none; }
    .cc-meta a:hover { color:#a7c4c4; }
    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      .article-header { padding: 44px 20px 36px; }
      .article-hero-img { padding: 0 20px; margin-bottom: 44px; }
      .article-body { padding: 0 20px 64px; }
      .article-title { font-size: 34px; }
      .article-body h2, .article-body .article-section h2 { font-size: 24px; }
      .article-body .drop-mic { padding: 28px 24px; }
      footer { padding: 40px 20px; }
    }

<script>

</script>
<script>
const SUPABASE_URL = 'https://dikuhcaaxxsadlwepblf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa3VoY2FheHhzYWRsd2VwYmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTc0MzMsImV4cCI6MjA5MjYzMzQzM30.yV2uutaX523kPtCKMea6dH-Hk4DkX5_ZwHAjCNXx610';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const parts = window.location.pathname.split('/').filter(Boolean);
const slug = parts[1] || '';

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function show(id) {
  ['state-loading', 'state-article', 'state-error'].forEach(function(s) {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

async function load() {
  if (!slug) { show('state-error'); return; }

  const { data, error } = await sb
    .from('articles')
    .select('*')
    .eq('slug', slug)
    .eq('status', 'published')
    .single();

  if (error || !data) { show('state-error'); return; }

  document.title = (data.seo_title || data.title) + ' — POST 205';
  document.getElementById('page-desc').setAttribute('content', data.seo_description || data.subtitle || '');
  document.getElementById('og-title').setAttribute('content', data.title);
  document.getElementById('og-desc').setAttribute('content', data.seo_description || data.subtitle || '');

  var dateLabel = data.date ? (' · ' + formatDate(data.date)) : '';
  document.getElementById('art-eyebrow').textContent = 'Frameworks' + dateLabel;
  document.getElementById('art-title').textContent = data.title;
  document.getElementById('art-sub').textContent = data.subtitle || '';
  document.getElementById('art-meta').textContent = data.author || 'Toffer Lorenzana';

  if (data.hero_image) {
    document.getElementById('art-hero').innerHTML =
      '<img src="' + data.hero_image + '" alt="' + data.title.replace(/"/g, '&quot;') + '">';
  }

  var body = document.getElementById('art-body');
  if (data.content_format === 'markdown') {
    marked.setOptions({ breaks: true, html: true });
    body.innerHTML = marked.parse(data.content || '');
  } else {
    body.innerHTML = data.content || '';
  }

  show('state-article');
}

load();
</script>
