[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Keep the shareable AIOS links page out of search engines
[[headers]]
  for = "/aios"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/claude-features"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/claude-features.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/notion"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/notion.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Keep /aios resolving to the crash-course page even though an /aios/ folder now exists
[[redirects]]
  from = "/aios"
  to = "/aios.html"
  status = 200

# Clean URL for the Notion AIOS page (serve /aios/notion without the .html)
[[redirects]]
  from = "/aios/notion"
  to = "/aios/notion.html"
  status = 200

# Let the uppercase /AIOS the user shares resolve to the page
[[redirects]]
  from = "/AIOS"
  to = "/aios"
  status = 301

[[redirects]]
  from = "/p/:slug"
  to = "/p/index.html"
  status = 200

[[redirects]]
  from = "/systems/:page"
  to = "/systems/:page.html"
  status = 200

[[redirects]]
  from = "/frameworks/:slug"
  to = "/frameworks/article.html"
  status = 200
