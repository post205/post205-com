[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Chat lead pipeline (submit-lead): client calls /api/submit-lead.
# Inert until TELEGRAM_BOT_TOKEN / OPS_LEAD_ENDPOINT env vars are set in Netlify.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# The StagePro demo is embedded as the "live proof" iframe inside the Service
# Agreement on sign.post205.com. X-Frame-Options can't express an allow-list, so
# for this path only we hand off to CSP frame-ancestors (the invalid XFO value is
# ignored by browsers, which then honour the CSP). Everything else stays DENY.
[[headers]]
  for = "/stagepro/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://post205.com https://sign.post205.com"

# The CPD demo is embedded live inside /work (same handoff trick as StagePro).
[[headers]]
  for = "/cpd/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Content-Security-Policy = "frame-ancestors 'self' https://post205.com"

# Keep the shareable AIOS links page out of search engines
[[headers]]
  for = "/aios"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/claude-features"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios/claude-features.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios-notion"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/aios-notion.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Keep /aios resolving to the crash-course page even though an /aios/ folder now exists
[[redirects]]
  from = "/aios"
  to = "/aios.html"
  status = 200

# Clean URL for the Notion AIOS page (its own home, separate from /aios)
[[redirects]]
  from = "/aios-notion"
  to = "/aios-notion.html"
  status = 200

# Old nested path → new standalone home (in case the earlier link was shared)
[[redirects]]
  from = "/aios/notion"
  to = "/aios-notion"
  status = 301

# Let the uppercase /AIOS the user shares resolve to the page
[[redirects]]
  from = "/AIOS"
  to = "/aios"
  status = 301

[[redirects]]
  from = "/p/:slug"
  to = "/p/index.html"
  status = 200

[[redirects]]
  from = "/systems/:page"
  to = "/systems/:page.html"
  status = 200

[[redirects]]
  from = "/frameworks/:slug"
  to = "/frameworks/article.html"
  status = 200

# StagePro demo — proxy /stagepro to its Netlify site. status=200 is a rewrite,
# so the URL stays post205.com/stagepro and Netlify is never exposed.
# Canonical URL is post205.com/stagepro/ (trailing slash, so relative assets
# resolve). Temporary until stagepro.ph is connected.
[[redirects]]
  from = "/stagepro/*"
  to = "https://stagepro-ph.netlify.app/:splat"
  status = 200

# ─── CV dossier embed (post205.com/docs/cv/krcl frames the homepage) ───
[[headers]]
  for = "/"
  [headers.values]
    X-Frame-Options = "ALLOW-VIA-CSP"
    Content-Security-Policy = "frame-ancestors 'self'"

# ─── CV dossier: keep out of search engines (page + files) ───
[[headers]]
  for = "/docs/cv/krcl/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ─── BNI one-to-one dance card: private, keep out of search ───
[[headers]]
  for = "/bni/1-2-1"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/bni/1-2-1.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
