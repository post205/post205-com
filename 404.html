<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — POST205</title>
  <meta name="robots" content="noindex">
  <meta property="og:image" content="https://post205.com/images/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
  <link rel="canonical" href="https://post205.com/">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:        #e7efee;
      --surface:      #f7fcfc;
      --border:       #c7d9d7;
      --text:         #0b1b1b;
      --text-2:       #41585a;
      --text-3:       #5a7473;
      --accent:       #0e9a9d;
      --on-accent:    #ffffff;
      --hero-bg:      #0f1416;
      --nav-accent:   #3BD1D3;
    }

    html, body { height: 100%; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* smooth load reveal */
    @keyframes pageReveal { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: no-preference) {
      .page-hero, footer { opacity: 0; animation: pageReveal .6s cubic-bezier(.22,1,.36,1) forwards; }
      footer { animation-delay: .18s; }
    }

    /* Nav — transparent over the dark hero, solid on scroll */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 60px;
      background: transparent; border-bottom: none; box-shadow: none;
      transition: background .3s ease, box-shadow .3s ease;
    }
    nav.nav-solid { background: rgba(15,20,22,0.97); box-shadow: 0 1px 0 rgba(255,255,255,0.05); }
    .nav-logo img { height: 22px; display: block; mix-blend-mode: screen; opacity: 0.9; }
    .nav-cta {
      font-family: ui-monospace, monospace;
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--on-accent); background: var(--accent);
      text-decoration: none; padding: 8px 14px; border-radius: 4px;
      font-weight: 500; transition: opacity 0.15s;
    }
    .nav-cta:hover { opacity: 0.85; }

    /* Dark hero with the 404 message */
    .page-hero { background: var(--hero-bg); padding: 150px 48px 110px; text-align: center; }
    .not-found-inner { max-width: 480px; margin: 0 auto; }
    .not-found-code {
      font-family: ui-monospace, monospace;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--nav-accent); margin-bottom: 24px;
    }
    .page-hero h1 {
      font-size: clamp(28px, 4vw, 40px); font-weight: 800;
      letter-spacing: -0.01em; line-height: 1.1; color: #f4f7f7; margin-bottom: 16px;
    }
    .page-hero p { font-size: 16px; color: #b9d2d2; line-height: 1.6; margin-bottom: 40px; }
    .btn-primary {
      display: inline-block; background: var(--accent); color: var(--on-accent);
      font-size: 15px; font-weight: 700; padding: 14px 28px; border-radius: 6px;
      text-decoration: none; letter-spacing: 0.01em; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }

    /* teal field between hero and footer */
    .grow { flex: 1; min-height: 40px; }

    /* Footer — dark bookend */
    footer {
      background: var(--hero-bg);
      padding: 40px 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-logo img { height: 20px; display: block; mix-blend-mode: screen; opacity: 0.6; }
    .footer-right {
      font-family: ui-monospace, monospace;
      font-size: 9px; letter-spacing: 0.06em; color: #5a7473; text-align: right; line-height: 1.8;
    }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .page-hero { padding: 120px 24px 80px; }
      footer { padding: 28px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
      .footer-right { text-align: left; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="/images/logo.png" alt="POST205">
  </a>
  <a href="/#contact" class="nav-cta">Let's talk</a>
</nav>

<section class="page-hero">
  <div class="not-found-inner">
    <div class="not-found-code">404</div>
    <h1>This page isn't here anymore.</h1>
    <p>Like a good idea that didn't scale.</p>
    <a href="/" class="btn-primary">Back to home</a>
  </div>
</section>

<div class="grow"></div>

<footer>
  <a href="/" class="footer-logo">
    <img src="/images/logo.png" alt="POST205">
  </a>
  <div class="footer-right">
    © 2026 · POST205, Inc.<br>3/F LZF Building, 25A Timog Avenue<br>South Triangle, Quezon City 1103
  </div>
</footer>

<script>
  (function(){ var n = document.querySelector('nav'); if(!n) return;
    var f = function(){ n.classList.toggle('nav-solid', window.scrollY > 10); };
    f(); window.addEventListener('scroll', f, { passive: true });
  })();
</script>

</body>
</html>
