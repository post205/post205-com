<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Article — POST 205 Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #18181A; --surface: #1a2424; --surface-2: #252f2f;
      --border: #1f3535; --border-2: #2a4040; --text: #f0f0f2; --text-2: #7aacac;
      --text-3: #3d6868; --accent: #3BD1D3; --on-accent: #021616;
      --danger: #e55a5a;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--black); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }

    /* NAV */
    nav { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
    .nav-left { display: flex; align-items: center; gap: 8px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-3); }
    .nav-left a { color: var(--text-3); text-decoration: none; transition: color 0.15s; }
    .nav-left a:hover { color: var(--text); }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .btn { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none; padding: 8px 14px; border-radius: 5px; transition: opacity 0.15s, background 0.15s; }
    .btn-ghost { background: none; border: 1px solid var(--border-2); color: var(--text-3); }
    .btn-ghost:hover { border-color: var(--text-3); color: var(--text-2); }
    .btn-accent { background: rgba(59,209,211,0.12); border: 1px solid var(--accent); color: var(--accent); }
    .btn-accent:hover { background: rgba(59,209,211,0.2); }
    .btn-primary { background: var(--accent); color: var(--on-accent); }
    .btn-primary:hover { opacity: 0.85; }
    #saveStatus { font-family: ui-monospace, monospace; font-size: 10px; color: var(--text-3); }

    /* META BAR */
    .meta-bar { flex-shrink: 0; display: grid; grid-template-columns: 1fr 1fr 140px 100px 100px; gap: 10px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .meta-row2 { flex-shrink: 0; display: grid; grid-template-columns: 1fr 140px; gap: 10px; padding: 0 24px 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
    label { display: block; font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
    input[type="text"], input[type="date"], input[type="url"], select {
      width: 100%; background: var(--black); border: 1px solid var(--border-2); border-radius: 5px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none; font-family: system-ui, -apple-system, sans-serif;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface-2); }

    /* EDITOR */
    .editor-wrap { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    .pane { display: flex; flex-direction: column; min-height: 0; }
    .pane-label { flex-shrink: 0; padding: 8px 16px; font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .pane-label span { display: flex; gap: 10px; }
    .pane-label a { color: var(--text-3); text-decoration: none; cursor: pointer; transition: color 0.15s; font-size: 9px; }
    .pane-label a:hover { color: var(--accent); }
    .editor-pane { flex: 1; min-height: 0; border-right: 1px solid var(--border); }
    textarea#content { width: 100%; height: 100%; background: var(--black); border: none; color: var(--text); font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.7; padding: 20px 20px; resize: none; outline: none; }
    .preview-pane { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* Preview article styles — mirrors the public template */
    .preview-pane h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); margin-bottom: 16px; margin-top: 40px; line-height: 1.2; }
    .preview-pane h2:first-child { margin-top: 0; }
    .preview-pane h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; margin-top: 28px; }
    .preview-pane p { font-size: 16px; line-height: 1.8; color: var(--text); margin-bottom: 16px; }
    .preview-pane ul, .preview-pane ol { margin: 0 0 16px 20px; }
    .preview-pane li { font-size: 16px; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
    .preview-pane strong { color: var(--text); font-weight: 700; }
    .preview-pane em { color: var(--text-2); }
    .preview-pane blockquote { border-left: 3px solid var(--accent); padding: 4px 0 4px 20px; margin: 0 0 28px; }
    .preview-pane blockquote p { font-style: italic; color: var(--text-2); margin: 0; }
    .preview-pane hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
    .preview-pane code { font-family: ui-monospace, monospace; font-size: 12px; background: var(--surface); color: var(--accent); padding: 2px 5px; border-radius: 3px; }
    .preview-pane pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; margin-bottom: 24px; overflow-x: auto; }
    .preview-pane pre code { background: none; padding: 0; color: var(--text-2); }
    .preview-pane a { color: var(--accent); }
    /* HTML content blocks */
    .preview-pane .article-section { margin-bottom: 40px; }
    .preview-pane .deep-dive { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; }
    .preview-pane .deep-dive p { font-size: 15px; color: var(--text-2); margin-bottom: 12px; }
    .preview-pane .pullquote { border-left: 3px solid var(--accent); padding: 4px 0 4px 20px; margin: 0 0 28px; }
    .preview-pane .pullquote p { font-style: italic; color: var(--text-2); font-size: 16px; margin: 0; }
    .preview-pane .drop-mic { background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 10px; padding: 28px; margin-bottom: 40px; }
    .preview-pane .drop-mic-label { font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
    .preview-pane .drop-mic p { color: var(--text); margin-bottom: 12px; }
    .preview-pane .prompt-block { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border-2); border-radius: 6px; padding: 16px 20px; margin-bottom: 24px; }
    .preview-pane .prompt-label { font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; }
    .preview-pane .prompt-block p { font-family: ui-monospace, monospace; font-size: 12px; color: var(--text-2); margin-bottom: 8px; }
    .preview-pane .accent-text { color: var(--accent); font-weight: 600; }

    /* Snippets dropdown */
    .snippets-wrap { position: relative; display: inline-block; }
    .snippets-menu { display: none; position: absolute; top: 100%; left: 0; margin-top: 4px; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 6px; min-width: 200px; z-index: 10; }
    .snippets-menu.open { display: block; }
    .snippet-item { display: block; padding: 8px 14px; font-family: ui-monospace, monospace; font-size: 10px; color: var(--text-2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; letter-spacing: 0.06em; }
    .snippet-item:hover { color: var(--accent); background: rgba(59,209,211,0.05); }

    @media (max-width: 768px) {
      .meta-bar { grid-template-columns: 1fr 1fr; }
      .editor-wrap { grid-template-columns: 1fr; }
      .preview-pane { display: none; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="/admin/">Admin</a>
    <span>·</span>
    <span id="nav-title">New Article</span>
  </div>
  <div class="nav-actions">
    <span id="saveStatus"></span>
    <button class="btn btn-ghost" onclick="saveDraft()">Save Draft</button>
    <button class="btn btn-primary" onclick="publish()">Publish</button>
  </div>
</nav>

<div class="meta-bar">
  <div>
    <label>Title</label>
    <input type="text" id="f-title" placeholder="Article title" oninput="autoSlug()">
  </div>
  <div>
    <label>Subtitle</label>
    <input type="text" id="f-subtitle" placeholder="Optional subtitle">
  </div>
  <div>
    <label>Date</label>
    <input type="date" id="f-date">
  </div>
  <div>
    <label>Section</label>
    <select id="f-section">
      <option value="frameworks">frameworks</option>
      <option value="tools">tools</option>
      <option value="case-studies">case-studies</option>
    </select>
  </div>
  <div>
    <label>Format</label>
    <select id="f-format">
      <option value="markdown">Markdown</option>
      <option value="html">HTML</option>
    </select>
  </div>
</div>
<div class="meta-row2">
  <div>
    <label>Slug <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3);font-family:system-ui;font-size:10px;">(URL: /frameworks/[slug]/)</span></label>
    <input type="text" id="f-slug" placeholder="auto-generated">
  </div>
  <div>
    <label>Hero Image URL</label>
    <input type="url" id="f-hero" placeholder="https://...">
  </div>
</div>

<div class="editor-wrap">
  <div class="pane editor-pane">
    <div class="pane-label">
      <span>Markdown</span>
      <span>
        <div class="snippets-wrap">
          <a id="snippetsToggle" onclick="toggleSnippets()">Insert snippet ▾</a>
          <div class="snippets-menu" id="snippetsMenu">
            <button class="snippet-item" onclick="insertSnippet('deep-dive')">Deep dive block</button>
            <button class="snippet-item" onclick="insertSnippet('pullquote')">Pull quote</button>
            <button class="snippet-item" onclick="insertSnippet('drop-mic')">Drop mic</button>
            <button class="snippet-item" onclick="insertSnippet('prompt-block')">Prompt block</button>
          </div>
        </div>
      </span>
    </div>
    <textarea id="content" placeholder="Write in Markdown...&#10;&#10;## Heading&#10;&#10;Paragraph text.&#10;&#10;> Pull quote&#10;&#10;Use the Insert snippet menu for special blocks." oninput="updatePreview()" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="pane-label">
      <span>Preview</span>
    </div>
    <div class="preview-pane" id="preview"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const SUPABASE_URL = 'https://dikuhcaaxxsadlwepblf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpa3VoY2FheHhzYWRsd2VwYmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTc0MzMsImV4cCI6MjA5MjYzMzQzM30.yV2uutaX523kPtCKMea6dH-Hk4DkX5_ZwHAjCNXx610';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

marked.setOptions({ breaks: true, html: true });

let articleId = null;
let slugManual = false;

const params = new URLSearchParams(window.location.search);
const editId = params.get('id');

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/admin/'; return; }

  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  if (editId) {
    articleId = editId;
    await loadArticle();
  }
}

async function loadArticle() {
  const { data, error } = await sb.from('articles').select('*').eq('id', articleId).single();
  if (error || !data) { alert('Article not found.'); return; }

  document.getElementById('nav-title').textContent = data.title || 'Edit Article';
  document.getElementById('f-title').value = data.title || '';
  document.getElementById('f-subtitle').value = data.subtitle || '';
  document.getElementById('f-date').value = data.date || '';
  document.getElementById('f-section').value = data.section || 'frameworks';
  document.getElementById('f-format').value = data.content_format || 'markdown';
  document.getElementById('f-slug').value = data.slug || '';
  document.getElementById('f-hero').value = data.hero_image || '';
  document.getElementById('content').value = data.content || '';
  slugManual = true;
  updatePreview();
}

function autoSlug() {
  if (slugManual) return;
  const title = document.getElementById('f-title').value;
  document.getElementById('f-slug').value = title
    .toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-');
}

document.getElementById('f-slug').addEventListener('input', function() {
  slugManual = this.value.length > 0;
});

function updatePreview() {
  const content = document.getElementById('content').value;
  const format = document.getElementById('f-format').value;
  const preview = document.getElementById('preview');
  if (format === 'markdown') {
    preview.innerHTML = marked.parse(content);
  } else {
    preview.innerHTML = content;
  }
}

document.getElementById('f-format').addEventListener('change', updatePreview);

function getArticleData(status) {
  const slug = document.getElementById('f-slug').value.trim();
  if (!slug) { alert('Slug is required.'); return null; }
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('Title is required.'); return null; }

  return {
    slug,
    title,
    subtitle: document.getElementById('f-subtitle').value.trim() || null,
    date: document.getElementById('f-date').value || null,
    section: document.getElementById('f-section').value,
    content_format: document.getElementById('f-format').value,
    hero_image: document.getElementById('f-hero').value.trim() || null,
    content: document.getElementById('content').value,
    status,
    author: 'Toffer Lorenzana'
  };
}

async function save(status) {
  const payload = getArticleData(status);
  if (!payload) return;

  setStatus('Saving...');
  let error;

  if (articleId) {
    ({ error } = await sb.from('articles').update(payload).eq('id', articleId));
  } else {
    const res = await sb.from('articles').insert(payload).select('id').single();
    error = res.error;
    if (res.data) {
      articleId = res.data.id;
      window.history.replaceState({}, '', '/admin/articles/edit.html?id=' + articleId);
    }
  }

  if (error) {
    setStatus('Error: ' + error.message);
  } else {
    setStatus(status === 'published' ? 'Published.' : 'Draft saved.');
    document.getElementById('nav-title').textContent = payload.title;
    setTimeout(function() { setStatus(''); }, 3000);
  }
}

function saveDraft() { save('draft'); }
function publish() { save('published'); }

function setStatus(msg) {
  document.getElementById('saveStatus').textContent = msg;
}

// Snippets
const SNIPPETS = {
  'deep-dive': '<div class="deep-dive">\n<p>Content here.</p>\n</div>\n',
  'pullquote': '<blockquote class="pullquote">\n  <p>Quote text here.</p>\n</blockquote>\n',
  'drop-mic': '<div class="drop-mic">\n  <div class="drop-mic-label">Label</div>\n  <p>Content here.</p>\n</div>\n',
  'prompt-block': '<div class="prompt-block">\n  <div class="prompt-label">Prompt</div>\n  <p>Prompt text here.</p>\n</div>\n'
};

function toggleSnippets() {
  document.getElementById('snippetsMenu').classList.toggle('open');
}

function insertSnippet(key) {
  const ta = document.getElementById('content');
  const snippet = '\n' + SNIPPETS[key];
  const start = ta.selectionStart;
  ta.value = ta.value.slice(0, start) + snippet + ta.value.slice(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = start + snippet.length;
  ta.focus();
  document.getElementById('snippetsMenu').classList.remove('open');
  updatePreview();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.snippets-wrap')) {
    document.getElementById('snippetsMenu').classList.remove('open');
  }
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveDraft();
  }
  if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'P') {
    e.preventDefault();
    publish();
  }
});

init();
</script>
</body>
</html>
